        "detail": "<h4>什么是金字塔原理</h4><p>由麦肯锡首位女性顾问芭芭拉·明托提出，核心思想：任何复杂问题都可以拆解为一个中心论点+若干支撑论据，像金字塔一样层层展开。</p><h4>核心原则</h4><ul><li><b>结论先行：</b>先说结论/结果，再说理由和细节——领导没耐心听你绕弯子</li><li><b>以上统下：</b>上层观点必须能概括下层内容，下层内容必须支撑上层观点</li><li><b>MECE原则：</b>同一层的论据要「相互独立、完全穷尽」——不重叠、不遗漏</li><li><b>横向归类：</b>同一层的论据按逻辑顺序排列（时间顺序/结构顺序/重要性顺序）</li></ul><h4>实操步骤（以工作汇报为例）</h4><ul><li><b>第一步：确定中心论点</b>——你想让听者记住的唯一一句话。例：『Q2用户增长不及预期，建议调整投放策略』</li><li><b>第二步：列出3-5个支撑论据</b>——为什么得出这个结论？例：①渠道A获客成本上升40% ②渠道B转化率下降25% ③竞品新策略抢占15%份额</li><li><b>第三步：每个论据再拆解</b>——如果需要，每个支撑点下面再列2-3个数据/事实</li><li><b>第四步：检查MECE</b>——论据之间有没有重叠？有没有遗漏重要因素？</li></ul><h4>日常应用场景</h4><ul><li>邮件写作：标题=结论 → 正文=3个要点 → 附件=详细数据</li><li>口头汇报：『老板，我建议……（结论），原因有三：第一……第二……第三……』</li><li>PPT演讲：每页标题=该页结论，正文=支撑数据</li></ul><h4>参考来源</h4><p>《金字塔原理》芭芭拉·明托（麦肯锡40年经典培训教材）| 36氪「职场思维」专栏</p>",

        "detail": "<h4>冰箱温度分布规律</h4><p>冰箱内部温度并非均匀：下层最冷（0-4°C），上层次之（4-6°C），门架最暖也最不稳定（6-10°C），抽屉湿度最高。</p><h4>最佳分区方案</h4><ul><li><b>下层（最冷区）：</b>生肉、生鱼、海鲜——用密封盒/保鲜袋装好，防止血水滴漏污染其他食物</li><li><b>上层（稳定区）：</b>剩菜、熟食、乳制品、鸡蛋——开封后3天内吃完</li><li><b>抽屉（高湿区）：</b>蔬菜、水果——用厨房纸包好再放（吸水防烂），不要洗完直接放</li><li><b>门架（最暖区）：</b>饮料、酱料、调味品——不要把鸡蛋/牛奶放这里（温度波动大，易变质）</li></ul><h4>各类食材保存要点</h4><ul><li><b>绿叶菜：</b>擦干水分 → 厨房纸包裹 → 放入保鲜袋扎口 → 冷藏可保鲜5-7天</li><li><b>土豆/洋葱/大蒜：</b>放阴凉通风处（不要放冰箱！低温会让淀粉转化为糖，口感变差且易发芽）</li><li><b>西红柿：</b>室温存放（冷藏会破坏细胞壁，失去风味），切开的用保鲜膜封切口冷藏</li><li><b>菌菇：</b>纸袋保存（塑料袋不透气，2天就发粘）</li><li><b>香蕉/芒果/牛油果：</b>室温催熟，熟了再放冰箱延缓腐烂</li><li><b>面包：</b>吃不完冷冻保存（冷藏会加速淀粉老化变干硬），吃时烤箱/空气炸锅复热</li></ul><h4>参考来源</h4><p>美国食品药品监督管理局(USDA)食品安全指南 | 下厨房社区经验整理 | 《食物与厨艺》Harold McGee</p>",

        "detail": "<h4>一句话原理</h4><p>太阳光由七色光谱组成（红橙黄绿青蓝紫）。当阳光穿过地球大气层时，会与空气分子和微小颗粒发生碰撞而向四面八方散射——这个现象叫<strong>瑞利散射</strong>。蓝光波长较短（约450nm），散射效率是红光（约700nm）的约10倍，所以天空呈现蓝色。</p><h4>需要知道的关键事实</h4><ul><li><b>为什么不是紫色？</b>——紫光波长更短，散射更强，但原因有三：①太阳光谱中紫光能量本来就比蓝光少 ②人眼对蓝光比紫光敏感 ③臭氧层会吸收部分紫光。综合结果=我们看见的是蓝色</li><li><b>为什么日出日落是红色？</b>——太阳在地平线附近时，阳光穿过的大气层厚度是正午时的数十倍。蓝光在长路径中被散射殆尽，只剩红光能穿透到我们眼中</li><li><b>为什么晴天天空更蓝？</b>——空气中的水汽和污染物较少，散射更纯净。阴天/雾霾天，水汽/颗粒物会散射所有波长的光，天空呈灰白色</li><li><b>为什么天空不是蓝色的？</b>——月球没有大气层，阳光直线传播没有散射，所以月球的天空是黑色的，即使在白天</li></ul><h4>实验验证</h4><p>找一个透明玻璃杯，装满水，滴入几滴牛奶。用强光手电筒从一侧照射——从侧面看，水呈现淡蓝色（散射光）；从对面看，光线偏橙红色（透射光）。这就是瑞利散射的微观演示。</p><h4>参考来源</h4><p>维基百科「瑞利散射」词条 | 果壳网「为什么天是蓝色的」科普文 | 英国物理学会《Physics Education》</p>",

        "detail": "<h4>核心事实</h4><p>人体约60%是水分，每天通过排尿（约1500ml）、出汗（约500ml）、呼吸（约400ml）、排便（约100ml）共流失约2500ml水分。需要通过饮水+食物补水来平衡。</p><h4>『8杯水』的来源</h4><p>1945年美国国家研究委员会（NRC）建议『每日摄入约2.5L水』——但这个建议包括了食物中的水分（约占每日20-30%）。后来被简化为『喝8杯水（约1.9L）』广为流传，实际上并不精确。</p><h4>科学计算方法</h4><ul><li><b>基础公式（成年人）：</b>体重(kg) × 30-35ml = 每日总需水量</li><li><b>示例：</b>60kg的人 ≈ 60×30 = 1800ml ≈ 1.8L（约7-8杯）</li><li><b>示例：</b>80kg的人 ≈ 80×30 = 2400ml ≈ 2.4L（约10杯）</li><li><b>调整因素：</b>运动后每小时+500ml、哺乳期+700ml、高温环境+500-1000ml</li></ul><h4>判断自己是否喝水足够</h4><ul><li>最简单方法：看尿液颜色——淡黄色=正常，深黄色=缺水，透明无色=喝太多了</li><li>口渴感：感到口渴时身体已经缺水1-2%了——养成定时喝水的习惯，不要等渴了再喝</li></ul><h4>怎么喝更健康</h4><ul><li><b>少量多次：</b>每次150-200ml，每小时不要超过800ml（短时间内大量喝水会稀释血液电解质，严重时引起水中毒）</li><li><b>早晨第一杯：</b>起床后喝200ml温开水——唤醒胃肠道、稀释血液、补充夜间流失的水分</li><li><b>饭前半小时：</b>喝水增加饱腹感，有助于控制食量</li><li><b>睡前：</b>睡前1小时少量饮水（约100ml），避免夜间起夜影响睡眠</li></ul><h4>特别提醒</h4><p>✗ 不要用含糖饮料/奶茶替代水——糖分摄入超标且不能真正解渴<br>✗ 不要迷信『碱性水/富氢水』等概念——普通白开水就是最好的选择<br>✗ 心脏病/肾病患者需遵医嘱控制饮水量</p><h4>参考来源</h4><p>丁香医生「每天喝多少水」| 健康时报「科学饮水指南」| 美国梅奥诊所(Mayo Clinic) hydration guidelines</p>",

// ======================== 逻辑 ========================
function fmtDate(s){var p=s.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日'}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function getLS(){try{return JSON.parse(localStorage.getItem('dk_learned')||'{}')}catch(e){return{}}}
function setLS(s){localStorage.setItem('dk_learned',JSON.stringify(s))}

function toggleLearn(id){
  var ls=getLS(),cur=ls[id];
  if(cur==='learned')ls[id]='unlearned';
  else if(cur==='unlearned')delete ls[id];
  else ls[id]='learned';
  setLS(ls);
  render();
}

var fltCat='all',fltSearch='';

function render(){
  var app=document.getElementById('app');
  if(!app)return;
  var today=DATA.today,items=DATA.knowledge[today]||[],ls=getLS();
  var arch=DATA.archive||{};

  var tl=0,tot=0;
  items.forEach(function(it){tot++;if(ls[it.id]==='learned')tl++});
  var totalL=0;
  items.forEach(function(it){if(ls[it.id]==='learned')totalL++});
  Object.keys(arch).forEach(function(k){(arch[k]||[]).forEach(function(it){if(ls[it.id]==='learned')totalL++})});

  var html='<header>'
    +'<div style="display:flex;align-items:center">'
    +'<h1>📖 每日知识</h1>'
    +'<button id="settings-btn" onclick="toggleSettings()" title="设置">⚙️</button>'
    +'</div>'
    +'<div class="sub">每天5个知识点·持续丰富自己·'+fmtDate(today)+'</div>'
    +'<div class="stats-row">'
    +'<span class="stat-item"><span class="num">'+tl+'</span><span class="lbl"> / '+tot+' 今日已学</span></span>'
    +'<span class="stat-item"><span class="num">'+totalL+'</span><span class="lbl">个知识点已学习</span></span>'
    +'<span class="stat-item"><span class="num">'+(Object.keys(arch).length+(items.length>0?1:0))+'</span><span class="lbl">天记录</span></span>'
    +'</div>'
    +'<div class="stats-bar"><div class="stats-fill" style="width:'+(tot>0?(tl/tot*100):0)+'%"></div></div>'
    +'</header>'
    +'<div class="settings-panel" id="settings-panel">'
    +'<h3>⚙️ 设置推送时间</h3>'
    +'<label>推送时间（北京时间）</label>'
    +'<div class="settings-row">'
    +'<input type="number" id="set-hour" min="0" max="23" value="9"> <span>时</span>'
    +'<input type="number" id="set-minute" min="0" max="59" value="0"> <span>分</span>'
    +'<span style="color:#484f58;font-size:12px">（当前: 每天 9:00）</span>'
    +'</div>'
    +'<label>GitHub Token（需要 repo + workflow 权限）</label>'
    +'<input type="password" id="gh-token" placeholder="github_pat_...">'
    +'<div class="settings-row">'
    +'<button class="btn-set primary" id="btn-save-time" onclick="saveTime()">💾 保存时间</button>'
    +'<button class="btn-set secondary" onclick="runNow()">▶️ 立即更新</button>'
    +'<button class="btn-set danger" onclick="clearToken()">🗑️ 清除 Token</button>'
    +'</div>'
    +'<div class="set-status" id="set-status"></div>'
    +'</div>';

  // today
  html+='<div class="section-title">📌 今日知识 <span class="badge badge-today">'+items.length+'条</span></div>';
  items.forEach(function(it){html+=cardHtml(it,today,true,ls)});

  // archive
  var dates=Object.keys(arch).sort().reverse();
  if(dates.length>0){
    html+='<div class="section-title" style="margin-top:36px">📅 往期知识 <span class="badge badge-past">'+dates.length+'天</span></div>';
    html+='<input id="arch-search" type="text" placeholder="🔍 搜索往期知识（按关键词、分类）" value="'+esc(fltSearch)+'" oninput="onSearch(this.value)">';
    var cats={};for(var i=0;i<items.length;i++)cats[items[i].cat]=1;
    Object.keys(arch).forEach(function(k){(arch[k]||[]).forEach(function(it){cats[it.cat]=1})});
    html+='<div class="filter-row"><button class="flt '+(fltCat==='all'?'on':'')+'" onclick="setFlt(\'all\')">全部</button>';
    Object.keys(cats).sort().forEach(function(c){html+='<button class="flt '+(fltCat===c?'on':'')+'" onclick="setFlt(\''+c+'\')">'+c+'</button>'});
    html+='</div>';

    var any=false;
    dates.forEach(function(dk){
      var di=(arch[dk]||[]).filter(function(it){
        if(fltCat!=='all'&&it.cat!==fltCat)return false;
        if(fltSearch){var q=fltSearch.toLowerCase();return it.title.toLowerCase().indexOf(q)!==-1||it.cat.toLowerCase().indexOf(q)!==-1||it.summary.toLowerCase().indexOf(q)!==-1}
        return true;
      });
      if(!di.length)return;
      any=true;
      html+='<div class="day-group"><div class="day-hdr">📅 '+fmtDate(dk)+'<span class="cnt"> '+di.length+'条</span></div>';
      di.forEach(function(it){html+=cardHtml(it,dk,false,ls)});
      html+='</div>';
    });
    if(!any)html+='<div class="day-empty">🔍 没有匹配的内容</div>';
  }else{
    html+='<div class="day-empty">📭 还没有往期知识——明天自动归档</div>';
  }

  app.innerHTML=html;

  // bind click
  var hs=document.querySelectorAll('.khead');
  for(var i=0;i<hs.length;i++){
    (function(el){el.addEventListener('click',function(){
      var body=this.nextElementSibling,arrow=this.querySelector('.karrow');
      if(body.classList.contains('open')){
        body.classList.remove('open');arrow.style.transform='rotate(0deg)';
      }else{
        var all=document.querySelectorAll('.kbody.open');
        for(var j=0;j<all.length;j++){all[j].classList.remove('open');all[j].previousElementSibling.querySelector('.karrow').style.transform='rotate(0deg)';}
        body.classList.add('open');arrow.style.transform='rotate(90deg)';
        setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'})},60);
      }
    })})(hs[i]);
  }
}

function cardHtml(it,ds,isToday,ls){
  var tc={'职场技能':'tag-work','生活技巧':'tag-life','科普常识':'tag-science','健康养生':'tag-health','效率工具':'tag-tool'}[it.cat]||'tag-work';
  var st=ls[it.id];
  var bc=st==='learned'?'border-color:#3fb950;color:#7ee787;background:#3fb95022':st==='unlearned'?'border-color:#f85149;color:#ff7b72;background:#f8514922':'border-color:#30363d;color:#8b949e';
  var bt=st==='learned'?'✅ 已学习':st==='unlearned'?'❌ 未学习':'○ 标记学习';
  return '<div class="kcard" data-id="'+it.id+'">'
    +'<div class="khead"><span class="tag '+tc+'">'+it.cat+'</span><span class="ktitle">'+esc(it.title)+'</span><span class="karrow">▸</span></div>'
    +'<div class="kbody"><div class="ksum">'+esc(it.summary)+'</div><div class="kdetail">'+it.detail+'</div>'
    +'<div class="ksource">📌 来源：'+esc(it.source)+'</div>'
    +'<div class="kfoot">'
    +'<span onclick="event.stopPropagation();toggleLearn(\''+it.id+'\')" style="display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border-radius:6px;border:1px solid;cursor:pointer;font-size:12px;font-weight:500;background:transparent;'+bc+'">'+bt+'</span>'
    +'<span class="kdate">'+(isToday?'今日':fmtDate(ds))+'</span></div></div></div>';
}

function onSearch(v){fltSearch=v;render()}
function setFlt(c){fltCat=c;render()}

// ======================== 设置面板 ========================
var GITHUB_OWNER = 'superNB666';
var GITHUB_REPO = 'daily-knowledge';

function toggleSettings(){
  var p=document.getElementById('settings-panel');
  p.classList.toggle('open');
  // 加载已保存的 token 和时间
  var savedToken=localStorage.getItem('dk_gh_token');
  if(savedToken) document.getElementById('gh-token').value=savedToken;
  var savedHour=localStorage.getItem('dk_sched_hour');
  var savedMin=localStorage.getItem('dk_sched_min');
  if(savedHour!==null) document.getElementById('set-hour').value=savedHour;
  if(savedMin!==null) document.getElementById('set-minute').value=savedMin;
}

function showStatus(msg,type){
  var s=document.getElementById('set-status');
  s.textContent=msg;
  s.className='set-status '+(type||'ok');
  if(type!=='loading') setTimeout(function(){s.className='set-status'},5000);
}

function clearToken(){
  localStorage.removeItem('dk_gh_token');
  document.getElementById('gh-token').value='';
  showStatus('Token 已清除','ok');
}

function saveTime(){
  var btn=document.getElementById('btn-save-time');
  btn.disabled=true;
  showStatus('正在设置...','loading');
  var token=document.getElementById('gh-token').value.trim();
  var hour=parseInt(document.getElementById('set-hour').value);
  var minute=parseInt(document.getElementById('set-minute').value);
  if(!token){showStatus('请先输入 GitHub Token','err');btn.disabled=false;return}
  if(isNaN(hour)||hour<0||hour>23){showStatus('小时请输入 0-23','err');btn.disabled=false;return}
  if(isNaN(minute)||minute<0||minute>59){showStatus('分钟请输入 0-59','err');btn.disabled=false;return}

  // 保存到 localStorage
  localStorage.setItem('dk_gh_token',token);
  localStorage.setItem('dk_sched_hour',hour);
  localStorage.setItem('dk_sched_min',minute);

  // 调用 GitHub API 触发 set-schedule 工作流
  var url='https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/actions/workflows/set-schedule.yml/dispatches';
  fetch(url,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github+json',
      'Content-Type':'application/json',
      'User-Agent':'daily-knowledge-web'
    },
    body:JSON.stringify({
      ref:'main',
      inputs:{hour:hour,minute:minute}
    })
  }).then(function(r){
    if(r.status===204){
      showStatus('✅ 设置成功！下次推送将改为每天 '+String(hour).padStart(2,'0')+':'+String(minute).padStart(2,'0'),'ok');
    }else if(r.status===401||r.status===403){
      return r.json().then(function(d){
        showStatus('❌ Token 无效或权限不足: '+(d.message||'请检查 token 权限（需要 repo+workflow）'),'err');
      });
    }else{
      return r.text().then(function(t){
        showStatus('❌ 失败 ('+r.status+'): '+t.slice(0,100),'err');
      });
    }
  }).catch(function(e){
    showStatus('❌ 网络错误: '+e.message,'err');
  }).finally(function(){
    btn.disabled=false;
  });
}

function runNow(){
  showStatus('正在触发更新...','loading');
  var token=document.getElementById('gh-token').value.trim();
  if(!token){showStatus('请先输入 GitHub Token','err');return}
  var url='https://api.github.com/repos/'+GITHUB_OWNER+'/'+GITHUB_REPO+'/actions/workflows/daily-update.yml/dispatches';
  fetch(url,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github+json',
      'Content-Type':'application/json',
      'User-Agent':'daily-knowledge-web'
    },
    body:JSON.stringify({ref:'main'})
  }).then(function(r){
    if(r.status===204){
      showStatus('✅ 已触发更新！约2分钟后网站刷新即可看到新内容','ok');
    }else if(r.status===401||r.status===403){
      return r.json().then(function(d){
        showStatus('❌ Token 无效或权限不足: '+(d.message||'请检查 token 权限'),'err');
      });
    }else{
      return r.text().then(function(t){
        showStatus('❌ 失败 ('+r.status+'): '+t.slice(0,100),'err');
      });
    }
  }).catch(function(e){
    showStatus('❌ 网络错误: '+e.message,'err');
  });
}

render();
</script>
</body>
</html>
