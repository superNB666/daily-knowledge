name: 每日知识更新
on:
  schedule:
    - cron: '55 0 * * *'   # 每天 UTC 0:55 = 北京 8:55
    - cron: '30 1 * * *'   # 每天 UTC 1:30 = 北京 9:30
    - cron: '0 3 * * *'    # 每天 UTC 3:00 = 北京 11:00
  workflow_dispatch:       # 手动触发
  push:
    branches: [main]       # 推送到 main 时也触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 生成今日知识
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python scripts/generate.py

      - name: 检查结果并提交
        run: |
          git config user.name "每日知识机器人"
          git config user.email "bot@daily-knowledge.org"
          git add data.json index.html
          if git diff --cached --quiet; then
            echo "今天内容无变化，跳过提交"
          else
            git commit -m "📚 每日知识更新 $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
