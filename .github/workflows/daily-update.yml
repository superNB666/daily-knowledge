name: 每日知识更新
on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 1:00 = 北京时间 9:00
  workflow_dispatch:       # 也可以手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 生成今日知识
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python scripts/generate.py

      - name: 检查结果并提交通知
        run: |
          git config user.name "每日知识机器人"
          git config user.email "bot@daily-knowledge.org"
          git add data.json index.html
          if git diff --cached --quiet; then
            echo "今天内容无变化，跳过提交"
          else
            git commit -m "📚 每日知识更新 $(date +%Y-%m-%d)"
            git push
          fi
